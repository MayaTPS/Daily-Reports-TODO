name: Daily Dashboard Update

on:
  schedule:
    # Daily at 7 AM Ontario time (EDT = 11 AM UTC, EST = 12 PM UTC)
    # Currently set to EDT (summer time)
    # If winter, change to: - cron: '0 12 * * *'
    - cron: '0 11 * * *'

  # Manual trigger from GitHub Actions tab
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-dashboard:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install gspread google-auth

      - name: Run dashboard generation script
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          SPREADSHEET_ID: 1PETs8uNdhJyLs0VibspKZk1Jts8hqQcaFcxKWneBiQ4
        run: python scripts/generate_dashboard.py

      - name: Commit and push updated dashboard
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --staged --quiet || git commit -m "chore: daily dashboard update $(date +'%Y-%m-%d %H:%M UTC')"
          git push
          